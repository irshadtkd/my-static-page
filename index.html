<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening Portal App...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, Arial, sans-serif;
      text-align: center;
      padding-top: 80px;
      background: #f5f5f7;
    }
    .message {
      font-size: 18px;
      color: #1d1d1f;
      margin-bottom: 10px;
    }
    .submessage {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e0e0e0;
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      display: inline-block;
      margin: 8px;
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .btn-store  { background: #007aff; color: white; }
    .btn-retry  { background: #e0e0e0; color: #1d1d1f; }

    /* Sections */
    #sectionOpening  { display: block;  }
    #sectionFallback { display: none;   }
  </style>
</head>
<body>

  <!-- Shown while trying to open app -->
  <div id="sectionOpening">
    <div class="spinner"></div>
    <p class="message">Opening App...</p>
    <p class="submessage">
      If a permission popup appears,<br>
      tap <strong>Allow</strong> to open the app.
    </p>
  </div>

  <!-- Shown only if app is not installed -->
  <div id="sectionFallback">
    <p class="message">App Not Installed</p>
    <p class="submessage">
      Download the app from the App Store<br>
      and try again.
    </p>
    <a href="https://apps.apple.com/app/id6761522671"
       class="btn btn-store">
      Download on App Store
    </a>
    <br/>
    <button class="btn btn-retry" onclick="tryOpenApp()">
      Try Again
    </button>
  </div>

<script>
  const appUrl      = "com.innovaturelabs.squarenixInnov://qr/123";
  const appStoreUrl = "https://apps.apple.com/app/id6761522671";

  let fallbackTimer  = null;
  let appOpened      = false;
  let popupIsShowing = false;

  // ── Show/hide sections ──────────────────────────
  function showOpening()  {
    document.getElementById("sectionOpening").style.display  = "block";
    document.getElementById("sectionFallback").style.display = "none";
  }

  function showFallback() {
    document.getElementById("sectionOpening").style.display  = "none";
    document.getElementById("sectionFallback").style.display = "block";
  }

  // ── Go to App Store ─────────────────────────────
  function goToStore() {
    clearTimeout(fallbackTimer);
    window.location.href = appStoreUrl;
  }

  // ── Main function ───────────────────────────────
  function tryOpenApp() {
    appOpened      = false;
    popupIsShowing = false;
    clearTimeout(fallbackTimer);
    showOpening();

    // Step 1: Try to open the app via URL scheme
    window.location.href = appUrl;

    // Step 2: If app opened → page goes hidden → cancel everything
    document.addEventListener("visibilitychange", function handler() {
      if (document.hidden) {
        appOpened = true;
        popupIsShowing = false;
        clearTimeout(fallbackTimer);
        document.removeEventListener("visibilitychange", handler);
      }
    });

    // Step 3: Permission popup appears → window loses focus (blur)
    // Cancel the timer and WAIT — do not redirect yet
    window.addEventListener("blur", function onBlur() {
      window.removeEventListener("blur", onBlur);

      if (appOpened) return; // app already opened, ignore

      popupIsShowing = true;
      clearTimeout(fallbackTimer); // pause — do not redirect during popup

      // Step 4: User dismisses popup → window gets focus back
      window.addEventListener("focus", function onFocus() {
        window.removeEventListener("focus", onFocus);
        popupIsShowing = false;

        // Wait briefly to let visibilitychange fire first
        // (in case user tapped Allow and app is opening)
        setTimeout(function () {
          if (!appOpened && !document.hidden) {
            // User tapped Cancel/Don't Allow OR app not installed
            // → go to App Store
            goToStore();
          }
        }, 3000);
      });
    });

    // Step 5: Safety fallback timer
    // If no blur/focus/visibilitychange fired at all
    // (app not installed, no popup shown) → redirect after 2.5s
    fallbackTimer = setTimeout(function () {
      if (!appOpened && !popupIsShowing && !document.hidden) {
        goToStore();
      }
    }, 3000);
  }

  // ── Auto trigger on page load ───────────────────
  window.addEventListener("load", function () {
    tryOpenApp();
  });

</script>
</body>
</html>
