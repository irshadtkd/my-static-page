<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>Open App</h2>

<a href="com.innovaturelabs.squarenixInnov://qr/123" id="openLink">
  <button>Open in App</button>
</a>

<script>
  const appUrl = "com.innovaturelabs.squarenixInnov://qr/123";
  const appStoreUrl = "https://apps.apple.com/app/id6761522671"; // replace

  document.getElementById("openLink").addEventListener("click", function () {
    const start = Date.now();

    setTimeout(function () {
      // If app didn’t open, redirect to App Store
      if (Date.now() - start < 2000) {
        window.location.href = appStoreUrl;
      }
    }, 3000);
  });
</script>

</body>
</html>
